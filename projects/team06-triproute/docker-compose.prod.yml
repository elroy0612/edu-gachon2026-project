services:
  triproute:
    image: ${TRIPROUTE_IMAGE:-ghcr.io/bbbj00/team06-triproute:latest}
    container_name: triproute
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s