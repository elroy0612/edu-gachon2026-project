name: TripRoute CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: Lint and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"
          enable-cache: true
  
      - name: Check lock file
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --locked

      - name: Run Ruff lint
        run: uv run ruff check app ui tests

      - name: Check Python syntax
        run: uv run python -m compileall -q app ui

      - name: Run tests
        run: uv run pytest tests -v